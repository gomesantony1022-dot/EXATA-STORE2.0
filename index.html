<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exata Store — Briefing & Orçamento</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="#" class="logo">EXATA <span style="color: #00E5FF; text-shadow: 0 0 10px #00E5FF, 0 0 20px #00E5FF;">STORE</span></a>
    </nav>

    <div class="container-formulario">
        <h2>Solicitação de Orçamento</h2>
        
        <form id="form-orcamento">
            <input type="hidden" id="web3forms-key" value="478c71c6-a637-416e-aed3-ee9700a2f826">
            <input type="hidden" id="input-hidden-preco" name="preco">

            <div class="campo-grupo">
                <label for="nome-cliente">Nome do Produtor / Artista</label>
                <input type="text" id="nome-cliente" required placeholder="Digite seu nome">
            </div>

            <div class="campo-grupo">
                <label for="whats-cliente">WhatsApp de Contato</label>
                <input type="text" id="whats-cliente" required placeholder="(00) 00000-0000">
            </div>

            <div class="campo-grupo">
                <label for="quantidade-faixas">Quantidade de Músicas</label>
                <input type="number" id="quantidade-faixas" min="1" value="1" required style="width: 100%; padding: 12px; background: rgba(30, 41, 59, 0.7); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 6px; color: #ffffff; font-size: 16px; box-sizing: border-box;">
            </div>

            <div class="campo-grupo">
                <label for="genero-musical">Gênero / Complexidade</label>
                <select id="genero-musical" required>
                    <option value="leve">Leve (Acústico / MPB / Indie)</option>
                    <option value="medio" selected>Médio (Pop / Rock / Sertanejo)</option>
                    <option value="pesado">Pesado (Eletrônico / Metal / Trap)</option>
                </select>
            </div>

            <div class="campo-grupo">
                <label>Porte do Setup</label>
                <div style="display: flex; gap: 15px; margin-top: 5px;">
                    <label style="display: flex; align-items: center; gap: 5px; color: #ffffff;">
                        <input type="radio" name="porte-projeto" value="pequeno" checked> Pequeno
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; color: #ffffff;">
                        <input type="radio" name="porte-projeto" value="intermediario"> Intermediário
                    </label>
                    <label style="display: flex; align-items: center; gap: 5px; color: #ffffff;">
                        <input type="radio" name="porte-projeto" value="profissional"> Profissional
                    </label>
                </div>
            </div>

            <div class="campo-grupo">
                <label for="prazo-entrega">Regime de Urgência</label>
                <select id="prazo-entrega" required>
                    <option value="normal" selected>Não (Prazo Normal)</option>
                    <option value="urgente">Sim (Urgente)</option>
                </select>
            </div>

            <div id="painel-resumo" style="background: rgba(30, 41, 59, 0.5); padding: 15px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; line-height: 1.6; border: 1px solid rgba(0, 229, 255, 0.1);">
                <strong style="color: #00E5FF;">Resumo Técnico:</strong><br>
                Músicas: <span id="resumo-faixas">1</span><br>
                Gênero: <span id="resumo-genero">Médio</span><br>
                Setup: <span id="resumo-porte">Pequeno</span><br>
                Urgência: <span id="resumo-prazo">Não (Normal)</span>
            </div>

            <button type="submit">Enviar Briefing</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
